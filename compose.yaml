services:
  book:
    build: .
    volumes:
      - ./articles:/book/articles
    environment:
      - REVIEW_CONFIG_FILE=${REVIEW_CONFIG_FILE:-config.yml}
    command: >
      bash -c "
        npm run pdf;
        echo '=== Watching for changes... ===';
        while inotifywait -r -e modify,create,delete /book/articles; do
          npm run pdf;
          echo '=== Watching for changes... ===';
        done
      "
